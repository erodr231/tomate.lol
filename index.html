<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tomate.lol</title>
    
    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=LINE+Seed+JP&family=Pangolin&display=swap" rel="stylesheet">
   
    <!-- styles -->
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body id="body">
    <header>
        <h1><a href="index.html">tomate.lol</a></h1>
        <nav>
            <ul>
                <li><a href="about.html">about</a></li>
                <li><a href="#">login</a></li>
            </ul>
        </nav>
    </header>

    <main> 
        <!-- center content -->

        <div class="timerDisplay">
            <p id="tagline">a pomodoro timer for getting things done.</p>

            <p id="mode">lets focus!</p>

            <h2 id="timer" hidden >25:00</h2>

            <button id="startBtn">
                <img src="images/tomato-button-design.svg" alt="tomato start button">
            </button>

            <div id="timerBtns" hidden>
                <button id="settingsBtn">
                    <img src="images/settingsButton.svg" alt="settings button">
                </button>
                
                <button id="pauseBtn">
                    <img src="images/pauseButton.svg" alt="pause button">
                </button>
                
                <button id="restartBtn">
                    <img src="images/restartButton.svg" alt="restart button">
                </button>
            </div>
            

            <p id="sessionCounter" hidden></p>
        </div>
        
        <!-- settings toggle -->
        <div class="settings" hidden>
            
            <button class="closeBtn" id="closeSettingsBtn">✕</button>
            
            <div class="settingsHeader">
                <h2>settings</h2>
            </div>
            
            <div>
                <label>focus time:</label>
                <input type="number" value="25" id="focusTime">
            </div>

            <div>
                <label>break time:</label>
                <input type="number" value="5" id="breakTime">
            </div>
            
            <div>
                <label>dark mode:</label>
                <label class="toggle">
                    <input type="checkbox" id="darkModeToggle" name="darkModeToggle">
                    <span class="slider"></span>
                </label>
            </div>

            <div>
                <label>session counter:</label>
                <label class="toggle">
                    <input type="checkbox" id="sessionToggle" name="sessionToggle" checked>
                    <span class="slider"></span>
                </label>
            </div>
            

            <button id="saveSettings">apply</button>
        </div>

        <!-- sticky note toggle -->
        <button id="sticky">
            <img src="images/stickyNoteIcon.svg" alt="sticky note button">
        </button>
        
        <!-- sticky note text area -->
        <div class="stickyNote" hidden>
            <div class="stickyHeader" id="dragHandle" hidden>
                notepad
                <button class="closeBtn" id="closeBtn">✕</button>
            </div>
            <textarea placeholder="type here!"></textarea>
        </div>
    </main>

    <footer>
        <a href="https://github.com/erodr231"><img src="images/github-142-svgrepo-com.svg" alt="github logo"></a>
        <a href="https://www.rodriguezemely.com/"><img src="images/frog-foot-svgrepo-com.svg" alt="frog foot illustration"></a>
        <a href="https://www.linkedin.com/in/emely-rodriguez-825b9527a/"><img src="images/linkedin-svgrepo-com.svg" alt="linkedin logo"></a>
    </footer>
</body>
