        <div class="timerDisplay">
            <p id="mode">lets focus!</p>
            <h2 id="timer" >25:00</h2>

            <button id="startBtn">
                <img src="images/tomato-button-design.svg" alt="tomato start button">

            <div id="timerBtns" hidden>
                <button>start</button>
                <button>pause</button>

            </div>
        </div>

        <!-- sticky note toggle -->
        <button id="sticky">
            <img src="images/sticky note icon.svg" alt="sticky note button">
        </button>
        
        <!-- sticky note text area -->
        <div class="stickyNote" hidden>
            <div class="stickyHeader" id="dragHandle">
                Sticky Note

            </div>
